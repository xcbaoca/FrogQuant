# Local runtime config. Copy from engine.example.yaml and adjust for your environment.
engine:
  symbol: BTCUSDT
  market_poll_ms: 1000
  control_port: 8080

risk:
  max_single_order_notional_usd: 100000.0
  max_position_ratio: 0.80
  daily_loss_stop_ratio: 0.05

execution:
  dry_run: true
  base_url: https://testnet.binancefuture.com
  credentials_path: config/credentials.env

logging:
  path: market_logs.jsonl

runtime:
  health_unhealthy_after_no_tick_sec: 15
  run_seconds: 0
  strategy_start_enabled: true
  state_path: config/runtime_state.json
  max_events_cache: 200
  max_orders_cache: 5000
  order_trim_batch: 1000

strategy:
  levels: 8
  order_qty: 0.001
  take_profit_ratio: 0.002
  dynamic_enabled: true
  recenter_threshold_ratio: 0.004
  band_ratio: 0.06
